all:
  children:
    # The primary seed node where the initial 'cephadm bootstrap' executes
    admin:
      hosts:
        ceph-node-1:
          ansible_host: 192.168.70.91
          cluster_net_addr: 10.10.90.91

    # All cluster members participating in the Ceph fabric
    nodes:
      hosts:
        ceph-node-1:
          ansible_host: 192.168.70.91
          cluster_net_addr: 10.10.90.91
        ceph-node-2:
          ansible_host: 192.168.70.92
          cluster_net_addr: 10.10.90.92
        ceph-node-3:
          ansible_host: 192.168.70.93
          cluster_net_addr:  10.10.90.93

  vars:
    ansible_user: deploy
    ansible_connection: ssh
    ansible_python_interpreter: /usr/bin/python3.12


