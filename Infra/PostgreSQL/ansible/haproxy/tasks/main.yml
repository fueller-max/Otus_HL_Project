---
# tasks file for haproxy
- name: Install Haproxy
  ansible.builtin.include_tasks:  install.yaml
  tags: 
     - install
  when: ansible_facts["os_family"] == "Debian"

- name: Provision Haproxy
  block:
   - ansible.builtin.include_tasks: 
       file: provision.yaml
  tags: 
     - provision
  when: ansible_facts["os_family"] == "Debian"