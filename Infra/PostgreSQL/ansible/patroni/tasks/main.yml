---
# tasks file for patroni
- name: Install Etcd
  ansible.builtin.include_tasks:  install.yaml
  tags: 
     - install
  when: ansible_facts["os_family"] == "Debian"

- name: Provision Etcd
  block:
   - ansible.builtin.include_tasks: 
       file: provision.yaml
  tags: 
     - provision
  when: ansible_facts["os_family"] == "Debian"