---
# tasks file for postgresql
- name: Install PostgreSQL
  ansible.builtin.include_tasks:  install.yaml
  tags: 
     - install
  when: ansible_facts["os_family"] == "Debian"

- name: Provision PostgreSQL
  block:
   - ansible.builtin.include_tasks: 
       file: provision.yaml
  tags: 
     - provision
  when: ansible_facts["os_family"] == "Debian"