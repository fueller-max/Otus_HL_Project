---
# tasks file for kube-cluster-master
- name: Provision nodes before Kubernetes installation
  ansible.builtin.include_tasks: 
    file: pre_provision.yml
  tags:
    - pre_provision  

- name: Install Kubernetes infrastructure. Containerd
  ansible.builtin.include_tasks: 
    file: install_containerd.yml   
  tags:
    - install_containerd   
    
- name: Install Kubernetes infrastructure. Kubeadm, Kubelet, Kubectl
  ansible.builtin.include_tasks: 
    file: install_kubernetes_ya.yml   
  tags:
    - install_kubernetes     

- name: Provision Kubernetes infrastructure. Setup Control Plane cluster
  ansible.builtin.include_tasks: 
    file: provision.yml   
  tags:
    - provision         