apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/kube-system_fluent-bit*/*.log
        Parser            cri-json
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.pods.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off

    [OUTPUT]
        Name            es
        Match           *
        # Pass all cluster node IPs as a comma-separated list
        Host            10.10.60.61
        Port            9200
        Logstash_Format On
        Logstash_Prefix kubernetes-cluster-logs
        Type            _doc
        Suppress_Type_Name   On
        tls             On
        tls.verify      Off
        http_api_key X1lBMWtKOEJ6VzEyTDVhYUtQTXI6dTZHUENhOGtjTmt2X1o2MVdmRVpWQQ==

  parsers.conf: |
    [PARSER]
        Name        cri-json
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]+) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
