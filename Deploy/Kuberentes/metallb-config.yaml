apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ext-ip-pool
  namespace: metallb-system
spec:
  addresses:
  - 203.0.113.155-203.0.113.160 # actual external network range
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: prod-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - ext-ip-pool